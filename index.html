fa-times"></i></button></div><form onsubmit="saveTG(event)"><input type="hidden" id="tgEditId"><div class="space-y-4"><div><label class="block text-sm font-medium text-gray-700 mb-1">Estudiante</label><select id="tgStudent" required class="w-full border rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"><option value="">Seleccionar</option>${S.students.map(s => `<option value="${s.id}">${s.nombre} (${s.curso})</option>`).join('')}</select></div><div><label class="block text-sm font-medium text-gray-700 mb-1">Materia</label><select id="tgSubject" required class="w-full border rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">${myS.map(s => `<option value="${s.id}">${s.nombre} (${s.curso})</option>`).join('')}</select></div><div><label class="block text-sm font-medium text-gray-700 mb-1">Período</label><select id="tgPeriod" required class="w-full border rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">${S.periods.map(p => `<option value="${p}">${p}</option>`).join('')}</select></div><div><label class="block text-sm font-medium text-gray-700 mb-1">Calificación (0-100)</label><input type="number" id="tgValue" min="0" max="100" required class="w-full border rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"></div></div><div class="flex justify-end gap-3 mt-6"><button type="button" onclick="closeModal('tgModal')" class="px-4 py-2 border rounded-lg text-sm text-gray-600 hover:bg-gray-50">Cancelar</button><button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium">Guardar</button></div></form></div></div>`;

    function renderMGRows(grades) {

    function filterMG() {

    function showTGModal(id = null) {

        document.getElementById('tgModalTitle').textContent = 'Nueva Calificación';
        if (id) { const g = S.grades.find(gr => gr.id === id); if (g) { document.getElementById('tgEditId').value = g.id; document.getElementById('tgStudent').value = g.estudianteId; document.getElementById('tgSubject').value = g.materiaId; document.getElementById('tgPeriod').value = g.periodo; document.getElementById('tgValue').value = g.calificacion; document.getElementById('tgModalTitle').textContent = 'Editar Calificación'; } }
    }

    function saveTG(e) {
        e.preventDefault();
        const id = document.getElementById('tgEditId').value;
        const subId = document.getElementById('tgSubject').value;
        const cal = parseInt(document.getElementById('tgValue').value);

        if (id) { const idx = S.grades.findIndex(g => g.id === id); S.grades[idx] = { ...S.grades[idx], ...data }; }
        else { S.grades.push({ id: genId(), ...data, fecha: today(), hora: nowTime() }); }

        save(); closeModal('tgModal'); notify('Calificación guardada', 'success'); renderApp();
    }

ounded-lg text-sm font-medium">Guardar</button></div></form></div></div>`;

    function renderLowPerformers() {

        const map = {}; low.forEach(g => { if (!map[g.estudianteId]) map[g.estudianteId] = { student: gStu(g.estudianteId), grades: [] }; map[g.estudianteId].grades.push(g); });

('') : '<p class="text-sm text-gray-400">Sin notas</p>'}</div></div><div class="mt-4 flex gap-2"><button onclick="nav('manageNotes')" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm"><i class="fas fa-sticky-note mr-1"></i>Agregar Nota</button><button onclick="sendNotif('${student.id}','${avg}')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm"><i class="fas fa-paper-plane mr-1"></i>Notificar</button></div></div>`; }).join('')}`;
    }

    function sendNotif(studentId, avg) {
        const st = gStu(studentId);
        const low = S.grades.filter(g => g.estudianteId === studentId && g.profesorId === S.currentUser.id && g.calificacion < 70);

        S.notifications.push({ id: genId(), message: `📩 Notificación a ${st.nombre} (${st.telefono}): Bajo rendimiento. Prom: ${avg}. Materias: ${details}. Prof: ${S.currentUser.nombre}`, date: today(), hora: nowTime(), read: false, type: 'notification_sent' });

    }

    function renderMyGrades() {
        const myG = S.grades.filter(g => g.estudianteId === S.currentUser.id);

    }

    // ==================== STUDENT: MY SUBJECTS ====================
    function renderStudentSubjects() {
        const myG = S.grades.filter(g => g.estudianteId === S.currentUser.id);
        const mySubIds = [...new Set(myG.map(g => g.materiaId))];
        const mySubs = S.subjects.filter(s => mySubIds.includes(s.id));
        return `<div class="mb-6"><h2 class="text-lg font-semibold text-gray-800">Mis Materias</h2></div><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">${mySubs.map(sub => { const tc = gTch(sub.profesorId); const sg = myG.filter(g => g.materiaId === sub.id); const avg = sg.length > 0 ? (sg.reduce((a,b) => a+b.calificacion,0)/sg.length).toFixed(1) : '-'; return `<div class="bg-white rounded-xl shadow-sm p-5 card-hover"><div class="flex items-center gap-3 mb-4"><div class="w-12 h-12 bg-purple-100 rounded-lg flex items-center justify-center"><i class="fas fa-book text-purple-600 text-lg"></i></div><div><h4 class="font-semibold text-gray-800">${sub.nombre}</h4><span class="badge bg-blue-100 text-blue-700">${sub.curso}</span></div></div><div class="space-y-2 text-sm"><p class="text-gray-600"><i class="fas fa-chalkboard-teacher mr-1 text-gray-400"></i>${tc.nombre}</p><p class="text-gray-600"><i class="fas fa-chart-line mr-1 text-gray-400"></i>Promedio: <span class="font-semibold ${avg >= 70 ? 'text-green-600' : avg !== '-' ? 'text-red-600' : ''}">${avg}</span></p></div></div>`; }).join('') || '<div class="col-span-3 text-center text-gray-400 py-12">Sin materias</div>'}</div>`;
    }

    // ==================== STUDENT: MY ATTENDANCE ====================
    function renderMyAttendance() {
        const myCourse = S.currentUser.curso;
        return `<div class="mb-6"><h2 class="text-lg font-semibold text-gray-800">Mi Asistencia</h2><p class="text-sm text-gray-500">Curso: ${myCourse}</p></div><div class="bg-white rounded-xl shadow-sm p-6"><table class="w-full"><thead class="bg-gray-50"><tr><th class="px-4 py-2 text-left text-xs font-semibold text-gray-500">Fecha</th><th class="px-4 py-2 text-left text-xs font-semibold text-gray-500">Estado</th><th class="px-4 py-2 text-left text-xs font-semibold text-gray-500">Obs.</th></tr></thead><tbody>${Object.keys(S.attendance).filter(k => k.includes(myCourse)).sort((a,b) => b.localeCompare(a)).map(key => { const date = key.split('_')[0]; const att = S.attendance[key][S.currentUser.id]; if (!att || !att.status) return ''; return `<tr class="border-b"><td class="px-4 py-2 text-sm">${fmtDate(date)}</td><td class="px-4 py-2"><span class="badge ${att.status === 'present' ? 'bg-green-100 text-green-700' : att.status === 'absent' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700'}">${att.status === 'present' ? 'Presente' : att.status === 'absent' ? 'Ausente' : 'Tardanza'}</span></td><td class="px-4 py-2 text-sm text-gray-600">${att.obs || '-'}</td></tr>`; }).join('') || '<tr><td colspan="3" class="px-4 py-8 text-center text-gray-400">Sin registros</td></tr>'}</tbody></table></div>`;
    }

    // ==================== PSYCHOLOGY ====================
    function renderGradeReport() {
        return `<div class="mb-6"><h2 class="text-lg font-semibold text-gray-800">Informe de Calificaciones</h2></div><div class="grid grid-cols-1 md:grid-cols-4 gap-5 mb-8">${statCard('Total', S.grades.length, 'fas fa-clipboard-list', 'bg-blue-100 text-blue-600')}${statCard('Promedio', S.grades.length > 0 ? (S.grades.reduce((a,b) => a+b.calificacion,0)/S.grades.length).toFixed(1) : '-', 'fas fa-chart-line', 'bg-green-100 text-green-600')}${statCard('Aprobados', S.grades.filter(g => g.calificacion >= 70).length, 'fas fa-check-circle', 'bg-emerald-100 text-emerald-600')}${statCard('Reprobados', S.grades.filter(g => g.calificacion < 70).length, 'fas fa-times-circle', 'bg-red-100 text-red-600')}</div><div class="bg-white rounded-xl shadow-sm p-6"><h3 class="font-semibold text-gray-800 mb-4"><i class="fas fa-users mr-2 text-green-500"></i>Detalle por Estudiante</h3><table class="w-full"><thead class="bg-gray-50"><tr><th class="px-4 py-2 text-left text-xs font-semibold text-gray-500">Estudiante</th><th class="px-4 py-2 text-left text-xs font-semibold text-gray-500">Teléfono</th><th class="px-4 py-2 text-left text-xs font-semibold text-gray-500">Curso</th><th class="px-4 py-2 text-left text-xs font-semibold text-gray-500">Promedio</th><th class="px-4 py-2 text-left text-xs font-semibold text-gray-500">Más Baja</th><th class="px-4 py-2 text-left text-xs font-semibold text-gray-500">Estado</th></tr></thead><tbody>${S.students.map(s => { const gs = S.grades.filter(g => g.estudianteId === s.id); const avg = gs.length > 0 ? (gs.reduce((a,b) => a+b.calificacion,0)/gs.length).toFixed(1) : '-'; const min = gs.length > 0 ? Math.min(...gs.map(g => g.calificacion)) : '-'; const hasLow = gs.some(g => g.calificacion < 70); return `<tr class="border-b hover:bg-gray-50"><td class="px-4 py-2 text-sm font-medium">${s.nombre}</td><td class="px-4 py-2 text-sm">📞 ${s.telefono || '-'}</td><td class="px-4 py-2"><span class="badge bg-blue-100 text-blue-700">${s.curso}</span></td><td class="px-4 py-2 font-bold ${avg >= 70 ? 'text-green-600' : avg !== '-' ? 'text-red-600' : ''}">${avg}</td><td class="px-4 py-2"><span class="badge ${min < 70 ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}">${min}</span></td><td class="px-4 py-2"><span class="badge ${hasLow ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}">${hasLow ? 'Alerta' : 'Normal'}</span></td></tr>`; }).join('')}</tbody></table></div>`;
    }

    function renderStudentNotes() {
        return `<div class="mb-6 flex flex-wrap gap-3"><select id="snStudent" onchange="filterSN()" class="border rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"><option value="">Todos</option>${S.students.map(s => `<option value="${s.id}">${s.nombre}</option>`).join('')}</select></div><div id="snContainer">${renderSNRows(S.notes)}</div>`;
    }

    function renderSNRows(notes) {
        return notes.length === 0 ? '<div class="text-center text-gray-400 py-12">Sin notas</div>' : `<div class="space-y-4">${notes.sort((a,b) => b.fecha.localeCompare(a.fecha)).map(n => { const st = gStu(n.estudianteId); const tc = gTch(n.profesorId); return `<div class="bg-white rounded-xl shadow-sm p-5 card-hover"><div class="flex items-start justify-between mb-3"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center"><i class="fas fa-user text-green-600"></i></div><div><h4 class="font-semibold">${st.nombre}</h4><p class="text-xs text-gray-500">${st.curso} | 📞 ${st.telefono || 'N/A'}</p></div></div><div><p class="text-sm font-medium text-gray-700">${tc.nombre}</p><p class="text-xs text-gray-400">${fmtDT(n.fecha, n.hora)}</p></div></div><p class="text-sm text-gray-700 bg-gray-50 p-4 rounded-lg">${n.contenido}</p></div>`; }).join('')}</div>`;
    }

    function filterSN() {
        const s = document.getElementById('snStudent')?.value || '';
        let f = S.notes;
        if (s) f = f.filter(n => n.estudianteId === s);
        const c = document.getElementById('snContainer');
        if (c) c.innerHTML = renderSNRows(f);
    }

    function renderAlerts() {
        const low = S.grades.filter(g => g.calificacion < 70); const map = {}; low.forEach(g => { if (!map[g.estudianteId]) map[g.estudianteId] = { student: gStu(g.estudianteId), grades: [] }; map[g.estudianteId].grades.push(g); });
        return `<div class="mb-6"><h2 class="text-lg font-semibold text-gray-800">Alertas Académicas</h2></div>${Object.keys(map).length === 0 ? '<div class="text-center text-gray-400 py-12"><i class="fas fa-check-circle text-4xl text-green-400 mb-4"></i><p>Sin alertas</p></div>' : Object.values(map).map(({ student, grades }) => { const avg = (grades.reduce((a,b) => a+b.calificacion,0)/grades.length).toFixed(1); const notes = S.notes.filter(n => n.estudianteId === student.id); return `<div class="bg-white rounded-xl shadow-sm p-6 mb-5 border-l-4 border-red-400"><div class="flex items-start gap-4 mb-4">${student.foto ? `<img src="${student.foto}" class="w-14 h-14 rounded-full object-cover">` : `<div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center"><i class="fas fa-exclamation-triangle text-red-600 text-xl"></i></div>`}<div><h3 class="text-lg font-bold">${student.nombre}</h3><p class="text-sm text-gray-500">${student.curso} | 📞 ${student.telefono || 'N/A'}</p><div class="flex gap-2 mt-1"><span class="badge bg-red-100 text-red-700">Prom: ${avg}</span>${notes.length ? `<span class="badge bg-yellow-100 text-yellow-700">${notes.length} notas</span>` : ''}</div></div></div><div class="space-y-2">${grades.map(g => `<div class="flex justify-between p-2 bg-red-50 rounded"><span class="text-sm">${gSub(g.materiaId)} (${g.periodo}) - ${fmtDate(g.fecha)}</span><span class="badge bg-red-200 text-red-700">${g.calificacion}</span></div>`).join('')}</div></div>`; }).join('')}`;
    }

    // ==================== TECH: USERS ====================
    function renderTechUsers() {
        return `<div class="mb-6 flex items-center justify-between"><h2 class="text-lg font-semibold text-gray-800">Gestión de Usuarios</h2><button onclick="showUserModal()" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg text-sm"><i class="fas fa-plus mr-1"></i>Nuevo Usuario</button></div><div class="bg-white rounded-xl shadow-sm overflow-hidden"><table class="w-full"><thead class="bg-gray-50 border-b"><tr><th class="px-5 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Nombre</th><th class="px-5 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Email</th><th class="px-5 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Teléfono</th><th class="px-5 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Rol</th><th class="px-5 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Acciones</th></tr></thead><tbody>${S.users.map(u => `<tr class="border-b hover:bg-gray-50"><td class="px-5 py-3 text-sm font-medium">${u.nombre}</td><td class="px-5 py-3 text-sm text-gray-600">${u.email}</td><td class="px-5 py-3 text-sm">📞 ${u.telefono || '-'}</td><td class="px-5 py-3"><span class="badge ${u.role === 'tech' ? 'bg-purple-100 text-purple-700' : u.role === 'admin' ? 'bg-blue-100 text-blue-700' : u.role === 'psychology' ? 'bg-pink-100 text-pink-700' : u.role === 'registro' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-700'}">${u.role}</span></td><td class="px-5 py-3"><div class="flex gap-2"><button onclick="editUser('${u.id}')" class="text-blue-500 text-sm"><i class="fas fa-edit"></i></button><button onclick="delUser('${u.id}')" class="text-red-500 text-sm"><i class="fas fa-trash"></i></button></div></td></tr>`).join('')}</tbody></table></div><div id="userModal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay"><div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4 p-6 fade-in"><div class="flex items-center justify-between mb-6"><h3 id="userModalTitle" class="text-lg font-bold text-gray-800">Nuevo Usuario</h3><button onclick="closeModal('userModal')" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button></div><form onsubmit="saveUser(event)"><input type="hidden" id="userEditId"><div class="space-y-4"><div><label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label><input type="text" id="userName" required class="w-full border rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-purple-500 outline-none"></div><div><label class="block text-sm font-medium text-gray-700 mb-1">Email</label><input type="email" id="userEmail" required class="w-full border rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-purple-500 outline-none"></div><div><label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label><input type="password" id="userPassword" required class="w-full border rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-purple-500 outline-none"></div><div><label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label><input type="tel" id="userPhone" class="w-full border rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-purple-500 outline-none"></div><div><label class="block text-sm font-medium text-gray-700 mb-1">Rol</label><select id="userRole" required class="w-full border rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-purple-500 outline-none"><option value="admin">Administrador</option><option value="tech">Tecnología</option><option value="psychology">Psicología</option><option value="registro">Registro</option></select></div></div><div class="flex justify-end gap-3 mt-6"><button type="button" onclick="closeModal('userModal')" class="px-4 py-2 border rounded-lg text-sm text-gray-600 hover:bg-gray-50">Cancelar</button><button type="submit" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg text-sm font-medium">Guardar</button></div></form></div></div>`;
    }

    function showUserModal(id = null) {
        document.getElementById('userModal').classList.remove('hidden');
        document.getElementById('userEditId').value = '';
        document.getElementById('userName').value = '';
        document.getElementById('userEmail').value = '';
        document.getElementById('userPassword').value = '';
        document.getElementById('userPhone').value = '';
        document.getElementById('userModalTitle').textContent = 'Nuevo Usuario';
        if (id) { const u = S.users.find(us => us.id === id); if (u) { document.getElementById('userEditId').value = u.id; document.getElementById('userName').value = u.nombre; document.getElementById('userEmail').value = u.email; document.getElementById('userPassword').value = u.password; document.getElementById('userPhone').value = u.telefono || ''; document.getElementById('userRole').value = u.role; document.getElementById('userModalTitle').textContent = 'Editar Usuario'; } }
    }

    function saveUser(e) {
        e.preventDefault();
        const id = document.getElementById('userEditId').value;
        const data = { nombre: document.getElementById('userName').value, email: document.getElementById('userEmail').value, password: document.getElementById('userPassword').value, telefono: document.getElementById('userPhone').value, role: document.getElementById('userRole').value };
        if (id) { const idx = S.users.findIndex(u => u.id === id); S.users[idx] = { ...S.users[idx], ...data }; }
        else { S.users.push({ id: genId(), ...data }); }
        save(); closeModal('userModal'); notify('Usuario guardado', 'success'); renderApp();
    }

    function editUser(id) { showUserModal(id); }
    function delUser(id) { if (confirm('¿Eliminar?')) { S.users = S.users.filter(u => u.id !== id); save(); renderApp(); } }

    // ==================== TECH: SUPPORT ====================
    function renderTechSupport() {
        return `<div class="mb-6 flex items-center justify-between"><h2 class="text-lg font-semibold text-gray-800">Soporte Técnico</h2><button onclick="showSupportModal()" class="bg-orange-600 hover:bg-orange-700 text-white px-4 py-2 rounded-lg text-sm"><i class="fas fa-plus mr-1"></i>Nuevo Ticket</button></div><div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-6">${statCard('Pendientes', S.techSupport.filter(t => t.status === 'pending').length, 'fas fa-clock', 'bg-orange-100 text-orange-600')}${statCard('En Proceso', S.techSupport.filter(t => t.status === 'in_progress').length, 'fas fa-spinner', 'bg-blue-100 text-blue-600')}${statCard('Resueltos', S.techSupport.filter(t => t.status === 'resolved').length, 'fas fa-check-circle', 'bg-green-100 text-green-600')}</div><div class="space-y-4">${S.techSupport.sort((a,b) => b.date.localeCompare(a.date)).map(t => `<div class="bg-white rounded-xl shadow-sm p-5 card-hover border-l-4 ${t.status === 'pending' ? 'border-orange-400' : t.status === 'in_progress' ? 'border-blue-400' : 'border-green-400'}"><div class="flex items-start justify-between mb-3"><div><h4 class="font-semibold text-gray-800">${t.title}</h4><p class="text-xs text-gray-500">${t.requester} | ${fmtDate(t.date)}</p></div><span class="badge ${t.status === 'pending' ? 'bg-orange-100 text-orange-700' : t.status === 'in_progress' ? 'bg-blue-100 text-blue-700' : 'bg-green-100 text-green-700'}">${t.status === 'pending' ? 'Pendiente' : t.status === 'in_progress' ? 'En Proceso' : 'Resuelto'}</span></div><p class="text-sm text-gray-600 bg-gray-50 p-3 rounded-lg mb-3">${t.description}</p>${t.response ? `<div class="bg-green-50 p-3 rounded-lg"><p class="text-sm text-green-800"><i class="fas fa-reply mr-1"></i>${t.response}</p></div>` : ''}${t.status !== 'resolved' ? `<div class="flex gap-2 mt-3"><button onclick="updateSupport('${t.id}','in_progress')" class="bg-blue-600 text-white px-3 py-1.5 rounded text-xs">En Proceso</button><button onclick="resolveSupport('${t.id}')" class="bg-green-600 text-white px-3 py-1.5 rounded text-xs">Resolver</button></div>` : ''}</div>`).join('') || '<div class="text-center text-gray-400 py-12">Sin tickets</div>'}</div><div id="supportModal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay"><div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4 p-6 fade-in"><div class="flex items-center justify-between mb-6"><h3 class="text-lg font-bold text-gray-800">Nuevo Ticket</h3><button onclick="closeModal('supportModal')" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button></div><form onsubmit="saveSupport(event)"><div class="space-y-4"><div><label class="block text-sm font-medium text-gray-700 mb-1">Solicitante</label><input type="text" id="supRequester" required class="w-full border rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-orange-500 outline-none"></div><div><label class="block text-sm font-medium text-gray-700 mb-1">Título</label><input type="text" id="supTitle" required class="w-full border rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-orange-500 outline-none"></div><div><label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label><textarea id="supDesc" rows="4" required class="w-full border rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-orange-500 outline-none resize-none"></textarea></div></div><div class="flex justify-end gap-3 mt-6"><button type="button" onclick="closeModal('supportModal')" class="px-4 py-2 border rounded-lg text-sm text-gray-600 hover:bg-gray-50">Cancelar</button><button type="submit" class="px-4 py-2 bg-orange-600 hover:bg-orange-700 text-white rounded-lg text-sm font-medium">Crear</button></div></form></div></div>`;
    }

    function showSupportModal() { document.getElementById('supportModal').classList.remove('hidden'); }
    function saveSupport(e) { e.preventDefault(); S.techSupport.push({ id: genId(), title: document.getElementById('supTitle').value, description: document.getElementById('supDesc').value, requester: document.getElementById('supRequester').value, date: today(), status: 'pending', response: '' }); save(); closeModal('supportModal'); notify('Ticket creado', 'success'); renderApp(); }
    function updateSupport(id, status) { const idx = S.techSupport.findIndex(t => t.id === id); S.techSupport[idx].status = status; save(); renderApp(); }
    function resolveSupport(id) { const resp = prompt('Respuesta:'); if (resp !== null) { const idx = S.techSupport.findIndex(t => t.id === id); S.techSupport[idx].status = 'resolved'; S.techSupport[idx].response = resp; save(); renderApp(); } }

    // ==================== NOTIFICATIONS ====================
    function renderNotifications() {
        return `<div class="mb-6 flex items-center justify-between"><h2 class="text-lg font-semibold text-gray-800">Notificaciones</h2><button onclick="markAllRead()" class="text-blue-600 text-sm hover:underline"><i class="fas fa-check-double mr-1"></i>Marcar todas leídas</button></div><div class="space-y-3">${S.notifications.sort((a,b) => b.date.localeCompare(a.date)).map(n => `<div class="bg-white rounded-xl shadow-sm p-5 ${n.read ? 'opacity-60' : 'border-l-4 border-blue-500'}"><div class="flex items-start justify-between"><div class="flex items-start gap-3"><div class="w-8 h-8 ${n.type === 'low_grade' ? 'bg-red-100 text-red-600' : n.type === 'notification_sent' ? 'bg-blue-100 text-blue-600' : n.type === 'new_student' ? 'bg-green-100 text-green-600' : 'bg-gray-100 text-gray-600'} rounded-full flex items-center justify-center flex-shrink-0"><i class="fas ${n.type === 'low_grade' ? 'fa-exclamation-triangle' : n.type === 'notification_sent' ? 'fa-paper-plane' : n.type === 'new_student' ? 'fa-user-plus' : 'fa-info'} text-sm"></i></div><div><p class="text-sm text-gray-700">${n.message}</p><p class="text-xs text-gray-400 mt-1">${fmtDT(n.date, n.hora)}</p></div></div>${!n.read ? `<button onclick="markRead('${n.id}')" class="text-blue-500 text-xs"><i class="fas fa-check"></i></button>` : '<span class="text-xs text-gray-400">Leída</span>'}</div></div>`).join('') || '<div class="text-center text-gray-400 py-12">Sin notificaciones</div>'}</div>`;
    }

    function markRead(id) { const idx = S.notifications.findIndex(n => n.id === id); if (idx >= 0) S.notifications[idx].read = true; save(); renderApp(); }
    function markAllRead() { S.notifications.forEach(n => n.read = true); save(); renderApp(); notify('Todas leídas', 'success'); }

    // ==================== INIT ====================
    DB.init();
    load();
    console.log('🚀 Sistema inicializado | Usuarios:', S.users.length);
    renderLogin();
    </script>
</body>
</html>
